version: 1
templates:
- template_id: office_summary_001
  template_name: 长文整理并生成结构化摘要
  scenario_family: office_study
  complexity_level: L2
  task_goal: 对给定长文进行摘要并抽取关键要点，最终输出为表格。
  step_chain:
  - 分类路由判断类
  - 文本摘要类
  - 结构化抽取类
  - 聚合最终生成类
  required_service_categories:
  - routing_classification
  - text_summary
  - structured_extraction
  - aggregation
  input_requirements:
  - 长文本
  constraints:
  - 输出需结构化
  - 保持信息完整
  oracle_expectations:
  - 最终结果可表格化
  - 要点覆盖率较高
